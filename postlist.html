---
layout: default 
title: "文章列表" 
---

<div class="content-box clearfix">
  <h1>{{ page.title }}</h1>
  
  <!-- 调试：显示文章数量 -->
  <p>检测到 {{ site.posts | size }} 篇文章</p>

  {% for post in site.posts %}
    <div class="post-item">
      <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
      <p>{{ post.date | date: "%Y-%m-%d" }}</p>
    </div>
  {% endfor %}
</div>
