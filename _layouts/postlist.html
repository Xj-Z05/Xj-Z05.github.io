---
layout: default
---

<aside class="sidebar">
  <!-- 保持与首页相同的侧边栏 -->
  {% include sidebar.html %}
</aside>

<div class="content-box clearfix">
  <header class="page-header">
    <h1>Posts</h1>  <!-- 自定义标题 -->
  </header>

  <!-- 文章列表循环 -->
  {% for post in site.posts %}
    <article class="post-preview">
      <h2>
        <a href="{{ post.url }}">{{ post.title }}</a>  <!-- 跳转到文章页 -->
      </h2>
      <div class="post-excerpt">
        {{ post.excerpt | default: post.content | strip_html | truncate: 150 }}  <!-- 显示摘要 -->
      </div>
      <div class="post-meta">
        <span class="post-date">{{ post.date | date: "%Y, %b %d" }}</span>
        <span class="post-stats">{{ post.rating }} semicross</span>  <!-- 示例统计信息 -->
      </div>
    </article>
    {% unless forloop.last %}<hr>{% endunless %}  <!-- 文章间分隔线 -->
  {% endfor %}
</div>
